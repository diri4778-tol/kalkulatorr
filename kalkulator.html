<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#2563eb,#020617 35%),
    radial-gradient(circle at bottom right,#06b6d4,#020617 35%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
}

/* BACKGROUND GLOW */
body::before{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:#2563eb;
    border-radius:50%;
    filter:blur(180px);
    opacity:0.30;
    top:-150px;
    left:-120px;
}

body::after{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:#06b6d4;
    border-radius:50%;
    filter:blur(180px);
    opacity:0.30;
    bottom:-150px;
    right:-120px;
}

/* MAIN CARD */
.calculator{

    position:relative;

    width:400px;

    padding:28px;

    border-radius:40px;

    background:rgba(15,23,42,0.60);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(28px);

    box-shadow:
    0 25px 70px rgba(0,0,0,0.55),
    0 0 35px rgba(59,130,246,0.15);

    overflow:hidden;
}

/* SHINE */
.calculator::before{
    content:'';
    position:absolute;

    top:-150%;
    left:-50%;

    width:200%;
    height:200%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.08),
        transparent
    );

    transform:rotate(25deg);

    animation:shine 8s linear infinite;
}

@keyframes shine{

    100%{
        transform:rotate(25deg) translateY(100%);
    }

}

/* TOP */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:24px;
}

.title{
    color:white;
    font-size:26px;
    font-weight:700;
}

.clock{
    color:rgba(255,255,255,0.55);
    font-size:12px;
    margin-top:4px;
    letter-spacing:1px;
}

.dot{
    width:14px;
    height:14px;

    border-radius:50%;

    background:#22c55e;

    box-shadow:
    0 0 10px #22c55e,
    0 0 22px #22c55e;
}

/* DISPLAY */
.display-container{
    position:relative;
    margin-bottom:24px;
}

.display{

    width:100%;
    height:120px;

    border:none;
    outline:none;

    border-radius:30px;

    padding:25px;
    padding-top:10px;
    padding-bottom:45px;

    text-align:right;

    font-size:46px;
    font-weight:700;

    color:#e0f2fe;

    background:
    linear-gradient(
        145deg,
        rgba(15,23,42,0.95),
        rgba(30,41,59,0.85)
    );

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    inset 0 4px 18px rgba(0,0,0,0.45),
    0 0 25px rgba(56,189,248,0.18);

    text-shadow:
    0 0 10px rgba(125,211,252,0.35);
}

/* PREVIEW */
.preview{

    position:absolute;

    bottom:16px;
    right:28px;

    color:rgba(255,255,255,0.35);

    font-size:22px;
    font-weight:500;

    pointer-events:none;
}

/* GRID */
.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
}

/* BUTTON */
button{

    height:72px;

    border:none;
    border-radius:24px;

    font-size:22px;
    font-weight:600;

    color:white;

    cursor:pointer;

    position:relative;

    overflow:hidden;

    transition:0.2s;
}

button:hover{
    transform:translateY(-3px);
}

button:active{
    transform:scale(0.92);
}

button::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:rgba(255,255,255,0.08);

    transition:0.4s;
}

button:hover::before{
    left:100%;
}

/* NUMBER */
.number{

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
    );

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 6px 16px rgba(0,0,0,0.25);
}

/* OPERATOR */
.operator{

    background:
    linear-gradient(
        145deg,
        #2563eb,
        #06b6d4
    );

    box-shadow:
    0 8px 18px rgba(37,99,235,0.35);
}

/* CLEAR */
.clear{

    background:
    linear-gradient(
        145deg,
        #ef4444,
        #dc2626
    );
}

/* BACKSPACE */
.backspace{

    background:
    linear-gradient(
        145deg,
        #f59e0b,
        #d97706
    );
}

/* EQUAL */
.equal{

    background:
    linear-gradient(
        145deg,
        #14b8a6,
        #06b6d4
    );

    grid-column:span 2;

    box-shadow:
    0 8px 18px rgba(6,182,212,0.35);
}

/* ZERO */
.zero{
    grid-column:span 2;
}

/* HISTORY */
.history{

    margin-top:18px;

    height:90px;

    overflow-y:auto;

    padding:14px;

    border-radius:20px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.05);

    color:rgba(255,255,255,0.7);

    font-size:14px;
}

.history-item{
    margin-bottom:8px;
    word-break:break-all;
}

.history::-webkit-scrollbar{
    width:4px;
}

.history::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.2);
    border-radius:10px;
}

/* RESULT EFFECT */
.result-animation{
    animation:pop 0.3s ease;
}

@keyframes pop{

    0%{
        transform:scale(0.92);
        opacity:0.7;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }

}

@media(max-width:450px){

    .calculator{
        width:95%;
        padding:22px;
    }

    button{
        height:66px;
        font-size:20px;
    }

    .display{
        height:110px;
        font-size:38px;
    }

}

</style>
</head>

<body>

<div class="calculator">

    <div class="top">

        <div>
            <div class="title">Calculator</div>
            <div id="clock" class="clock">00:00</div>
        </div>

        <div class="dot"></div>

    </div>

    <div class="display-container">

        <div id="preview" class="preview">0</div>

        <input type="text" id="display" class="display" value="0" readonly>

    </div>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">AC</button>
        <button class="backspace" onclick="backspace()">⌫</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="toggleSign()">±</button>
        <button class="number zero" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>

        <button class="equal" onclick="calculate()">=</button>

    </div>

    <div id="history" class="history">
        <div class="history-item">No history</div>
    </div>

</div>

<script>

const display = document.getElementById("display");
const preview = document.getElementById("preview");
const historyBox = document.getElementById("history");
const clock = document.getElementById("clock");

/* CLOCK */
function updateClock(){

    const now = new Date();

    let h = now.getHours().toString().padStart(2,'0');
    let m = now.getMinutes().toString().padStart(2,'0');

    clock.innerText = `${h}:${m}`;

}

setInterval(updateClock,1000);

updateClock();

/* SOUND */
function playClick(){

    const audio = new Audio(
        "https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
    );

    audio.volume = 0.05;

    audio.play();

}

/* FORMAT NUMBER */
function formatNumber(num){

    return Number(num).toLocaleString('id-ID',{
        maximumFractionDigits:10
    });

}

/* INPUT */
function appendValue(value){

    playClick();

    if(display.value === "0" && value !== "."){

        display.value = value;

    }else{

        display.value += value;

    }

    updatePreview();

}

/* PREVIEW */
function updatePreview(){

    try{

        let expression = display.value
            .replace(/,/g,'.')
            .replace(/%/g,"/100");

        let result = eval(expression);

        if(
            result !== undefined &&
            !isNaN(result)
        ){

            preview.innerText = formatNumber(result);

        }else{

            preview.innerText = "";

        }

    }catch{

        preview.innerText = "";

    }

}

/* CLEAR */
function clearDisplay(){

    playClick();

    display.value = "0";

    preview.innerText = "0";

}

/* BACKSPACE */
function backspace(){

    playClick();

    if(display.value.length === 1){

        display.value = "0";

    }else{

        display.value = display.value.slice(0,-1);

    }

    updatePreview();

}

/* SIGN */
function toggleSign(){

    playClick();

    if(display.value.startsWith("-")){

        display.value = display.value.substring(1);

    }else if(display.value !== "0"){

        display.value = "-" + display.value;

    }

    updatePreview();

}

/* HISTORY */
function addHistory(expression,result){

    if(historyBox.innerHTML.includes("No history")){
        historyBox.innerHTML = "";
    }

    const item = document.createElement("div");

    item.className = "history-item";

    item.innerHTML = `
        ${expression} = <b>${result}</b>
    `;

    historyBox.prepend(item);

}

/* CALCULATE */
function calculate(){

    playClick();

    try{

        let expression = display.value
            .replace(/,/g,'.')
            .replace(/%/g,"/100");

        let result = eval(expression);

        if(isNaN(result)){

            display.value = "Error";
            preview.innerText = "";

        }else{

            const formatted = formatNumber(result);

            addHistory(display.value,formatted);

            display.value = formatted;

            preview.innerText = "";

            display.classList.add("result-animation");

            setTimeout(()=>{

                display.classList.remove("result-animation");

            },300);

        }

    }catch{

        display.value = "Error";
        preview.innerText = "";

    }

}

/* KEYBOARD */
document.addEventListener("keydown",(e)=>{

    const key = e.key;

    if(!isNaN(key) || ['+','-','*','/','.','%'].includes(key)){
        appendValue(key);
    }

    if(key === "Enter"){
        calculate();
    }

    if(key === "Backspace"){
        e.preventDefault();
        backspace();
    }

    if(key === "Escape"){
        clearDisplay();
    }

});

</script>

</body>
</html>
